<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Intercom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 1.25rem;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.01em;
      color: #fff;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="password"] {
      background: #111;
      border: 1px solid #333;
      border-radius: 0.6rem;
      color: #e8e8e8;
      font-size: 1rem;
      padding: 0.7rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #555;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    button {
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.85rem;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #btn-open  { background: #22c55e; color: #000; }
    #btn-close { background: #ef4444; color: #fff; }

    .status {
      text-align: center;
      font-size: 0.875rem;
      min-height: 1.4rem;
      transition: color 0.2s;
    }

    .status.ok      { color: #22c55e; }
    .status.error   { color: #ef4444; }
    .status.pending { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#x1F6AA; Home Intercom</h1>

    <div class="input-wrap">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter door password" autocomplete="current-password" />
    </div>

    <div class="buttons">
      <button id="btn-open">Open</button>
      <button id="btn-close">Close</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const statusEl      = document.getElementById('status');
    const btnOpen       = document.getElementById('btn-open');
    const btnClose      = document.getElementById('btn-close');

    async function sendCommand(action) {
      const password = passwordInput.value;
      if (!password) {
        setStatus('Enter a password first.', 'error');
        return;
      }

      setStatus('Sending\u2026', 'pending');
      setButtons(true);

      try {
        const res = await fetch('/api/' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          setStatus('Door ' + action + 'ed.', 'ok');
        } else {
          setStatus(data.error || 'Request failed.', 'error');
        }
      } catch {
        setStatus('Could not reach the device.', 'error');
      } finally {
        setButtons(false);
      }
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (type || '');
    }

    function setButtons(disabled) {
      btnOpen.disabled  = disabled;
      btnClose.disabled = disabled;
    }

    btnOpen.addEventListener('click',  () => sendCommand('open'));
    btnClose.addEventListener('click', () => sendCommand('close'));

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendCommand('open');
    });
  </script>
</body>
</html>
